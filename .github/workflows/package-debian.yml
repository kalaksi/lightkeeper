name: Build Debian 14 package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-debian-package:
    name: Build Debian 14 package
    permissions:
      contents: read
    runs-on: ubuntu-latest
    container:
      image: debian:forky

    steps:
      - name: Install build dependencies
        run: |
          printf '%s\n' 'Acquire::ForceIPv4 "true";' 'Acquire::Retries "5";' \
            >/etc/apt/apt.conf.d/99github-actions.conf
          apt-get update
          apt-get install -y \
            git ca-certificates \
            gcc g++ make \
            rustc cargo \
            qt6-base-dev qt6-declarative-dev \
            libdbus-1-dev liboping-dev libssl-dev \
            perl debhelper devscripts dpkg-dev
          rustc --version

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Trust workspace for Git in container
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Resolve version
        id: version
        run: |
          VERSION=$(./packaging/scripts/version.sh)
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build .deb package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALLDIR="packaging/debian/tarballs"
          BUILDDIR="packaging/debian/build"
          ./packaging/debian/scripts/build-binary.sh "${VERSION}" "${TARBALLDIR}" "${BUILDDIR}"

          mkdir -p artifacts/deb
          cp -a "${BUILDDIR}"/*.deb artifacts/deb/
          cp -a "${BUILDDIR}"/*.changes artifacts/deb/ || true
          cp -a "${BUILDDIR}"/*.buildinfo artifacts/deb/ || true

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: debian-deb
          path: artifacts/deb/*

  release-upload:
    name: Upload Debian 14 artifacts to release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-debian-package]
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Download .deb artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: debian-deb
          path: dist/deb

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          for file in dist/deb/*.deb; do
            gh release upload "${{ github.ref_name }}" "${file}" --clobber
          done
