app-id: io.github.kalaksi.Lightkeeper
base: io.qt.qtwebengine.BaseApp
base-version: '6.10'
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
sdk-extensions:
  # For runtime version 6.10, org.freedesktop.Sdk.Extension.rust-stable/x86_64/25.08 is the appropriate Rust extension.
  - "org.freedesktop.Sdk.Extension.rust-stable"
command: lightkeeper
finish-args:
  - "--share=ipc"
  - "--socket=fallback-x11"
  - "--socket=wayland"
  - "--share=network"
  - "--device=dri"
  - "--socket=ssh-auth"
  - "--talk-name=org.kde.StatusNotifierWatcher"
  - "--env=SSH_ASKPASS=/app/bin/ksshaskpass"
  - "--env=QTWEBENGINEPROCESS_PATH=/app/bin/QtWebEngineProcess"
cleanup:
  - /include
  - /lib/cmake
  - /lib/*/cmake
  - /lib/pkgconfig
  - /mkspecs
  - /share/man
  - '*.la'
  - '*.a'
cleanup-commands:
    - /app/cleanup-BaseApp.sh
modules:
  - name: qmltermwidget
    buildsystem: qmake
    sources:
      - type: git
        # Fork from repo https://github.com/Swordfish90/qmltermwidget.git to add Qt 6 support.
        # Follows branch `lightkeeper`
        url: https://github.com/kalaksi/qmltermwidget.git
        commit: 6b73b77690948f17f5c881fd79153191d066be10
    make-install-args:
      - "INSTALL_ROOT=/app/qmltermwidget"
  - name: ChartJs2QML
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/kalaksi/ChartJs2QML
        commit: cb1fbcb2618e5172ab0baebfd7a58908d0208fc5
        dest: 'ChartJs2QML'
    build-commands:
      - rm -rf ChartJs2QML/.git
      - cp -va ChartJs2QML /app/ChartJs2QML
  - name: qml-lighthouse-components
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/kalaksi/qml-lighthouse-components.git
        commit: ed27d983d1927dc45d18cdb74a255f4e42a5d27f
        dest: 'qml-lighthouse-components'
    build-commands:
      - cd qml-lighthouse-components/Lighthouse/AceEditor/ace-builds
        && git sparse-checkout init --no-cone
        && git sparse-checkout set LICENSE src-min-noconflict
        && cd ../../../..
      - cp -a qml-lighthouse-components /app/qml-lighthouse-components
  - name: qt6keychain
    buildsystem: cmake-ninja
    build-options:
      config-opts:
        - "-DBUILD_WITH_QT6=ON"
    sources:
      - type: git
        url: https://github.com/frankosterfeld/qtkeychain.git
        # 0.15.0
        commit: ad7344c45a86a4f66cbafc4b081b5f7b876cb0b7
  - name: ksshaskpass
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://invent.kde.org/plasma/ksshaskpass.git
        # Plasma/6.6
        commit: 67c43fee0d003e085b34fdeada468a0a5c8cf92e
  - name: rsync
    buildsystem: autotools
    config-opts:
      - --disable-md2man
      - --without-included-zlib
    sources:
      - type: archive
        url: https://download.samba.org/pub/rsync/src/rsync-3.4.1.tar.gz
        sha256: 2924bcb3a1ed8b551fc101f740b9f0fe0a202b115027647cf69850d65fd88c52
  - name: lightkeeper
    buildsystem: simple
    sources:
      - type: archive
        url: https://github.com/kalaksi/lightkeeper/archive/refs/tags/v0.38.0.tar.gz
        sha256: 5842edad8608b9431103bb4834974e8fb8287541cd39b99d9b51d27255bfae81
      - "cargo-sources.json"
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        RUSTFLAGS: "--remap-path-prefix =../"
        CARGO_HOME: /run/build/lightkeeper/cargo
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release --no-default-features --features flatpak --verbose
      - install -Dm755 ./target/release/lightkeeper -t /app/bin
      - install -Dm644 ./flatpak/${FLATPAK_ID}.metainfo.xml -t /app/share/metainfo
      - install -Dm644 ./flatpak/${FLATPAK_ID}.desktop -t /app/share/applications
      - install -Dm644 ./flatpak/${FLATPAK_ID}-rounded.png /app/share/icons/hicolor/128x128/apps/${FLATPAK_ID}.png
